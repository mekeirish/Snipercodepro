<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snipercode — IDE Chirurgical</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: {
                            900: '#0b0b0d',
                            800: '#0f0f11',
                            700: '#141418',
                            600: '#16161a',
                            500: '#1a1a1f',
                        },
                        cyber: {
                            violet: '#8b5cf6',
                            'violet-hover': '#7c3aed',
                            amber: '#f59e0b',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neu-dark': 'inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.6)',
                        'neu-pressed': 'inset 0 2px 4px rgba(0,0,0,0.6), inset 0 -1px 0 rgba(255,255,255,0.03)',
                        'glow-violet': '0 0 15px rgba(139,92,246,0.3), 0 0 30px rgba(139,92,246,0.1)',
                        'glow-amber': '0 0 10px rgba(245,158,11,0.3), 0 0 20px rgba(245,158,11,0.1)',
                    },
                }
            }
        }
    </script>
    
    <style>
        body {
            background: radial-gradient(ellipse at 50% 0%, #121218 0%, #0b0b0d 70%);
            letter-spacing: -0.01em;
        }
        
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f11;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
        
        .btn-press {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-press:active {
            transform: scale(0.98);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6), inset 0 -1px 0 rgba(255,255,255,0.03);
        }
        
        @keyframes pulse-amber {
            0% { opacity: 0.4; transform: scale(0.85); box-shadow: 0 0 6px rgba(245,158,11,0.3); }
            100% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 14px rgba(245,158,11,0.7); }
        }
        
        .editor-box {
            tab-size: 2;
            caret-color: #8b5cf6;
        }
        .editor-box::selection {
            background: rgba(139,92,246,0.35);
            color: #fff;
        }
        
        input:focus, textarea:focus {
            box-shadow: 0 0 0 2px rgba(139,92,246,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0d">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body onload="loadConfig()" class="font-sans text-zinc-100 antialiased min-h-screen p-4 md:p-6">

    <!-- Toast -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[3000] 
                bg-cyber-amber text-deep-900 font-bold px-6 py-3 rounded-xl 
                shadow-[0_8px_30px_rgba(0,0,0,0.7)] hidden text-sm tracking-wide">
    </div>

    <!-- Barre de confirmation -->
    <div id="confirmBar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-24px)] max-w-[500px] 
                bg-deep-600/95 backdrop-blur-md border-2 border-cyber-amber/50 rounded-2xl p-6 
                z-[2000] hidden flex-col gap-5 shadow-[0_0_40px_rgba(0,0,0,0.8)]">
        <span id="confirmMsg" class="text-center text-white font-bold text-sm tracking-wider"></span>
        <div class="flex gap-3 w-full">
            <button class="btn-press flex-1 py-3 bg-zinc-700 rounded-xl text-white font-semibold text-sm uppercase tracking-wider hover:bg-zinc-600 transition-colors" 
                    onclick="closeConfirm()">Annuler</button>
            <button class="btn-press flex-1 py-3 bg-cyber-violet rounded-xl text-white font-bold text-sm uppercase tracking-wider shadow-glow-violet hover:bg-cyber-violet-hover transition-all" 
                    id="finalSaveBtn">Confirmer</button>
        </div>
    </div>

    <!-- Conteneur principal -->
    <div class="w-full max-w-[880px] mx-auto pb-20">

        <!-- Carte de connexion -->
        <div class="bg-deep-600/80 backdrop-blur-sm border border-zinc-800/60 rounded-2xl p-6 mb-6 shadow-neu-dark">
            
            <!-- Token -->
            <div class="relative mb-4">
                <label class="block text-xs font-semibold uppercase tracking-[0.12em] text-zinc-500 mb-3 ml-1">
                    GitHub Token
                </label>
                <div class="relative">
                    <input type="password" id="ghToken" placeholder="Sauvegardé localement" oninput="saveConfig()"
                           class="w-full bg-deep-700 border border-zinc-800/40 rounded-xl pl-4 pr-12 py-3.5 
                                  text-cyber-amber font-mono text-sm placeholder-zinc-600
                                  shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] border-l-[3px] border-l-cyber-amber/70
                                  focus:outline-none transition-all duration-200">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600 text-sm pointer-events-none">🔒</span>
                </div>
            </div>

            <!-- Repo -->
            <div class="mb-5">
                <label class="block text-xs font-semibold uppercase tracking-[0.12em] text-zinc-500 mb-3 ml-1">
                    Dépôt
                </label>
                <input type="text" id="repoName" placeholder="pseudo/repository" oninput="saveConfig()"
                       class="w-full bg-deep-700 border border-zinc-800/40 rounded-xl px-4 py-3.5 
                              text-zinc-100 font-mono text-sm placeholder-zinc-600
                              shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] 
                              focus:outline-none transition-all duration-200">
            </div>

            <!-- Actions -->
            <div class="space-y-3">
                <button class="btn-press w-full py-4 bg-cyber-violet hover:bg-cyber-violet-hover 
                               text-white font-bold text-sm uppercase tracking-[0.12em] rounded-xl
                               shadow-glow-violet transition-all duration-200 flex items-center justify-center gap-2"
                        onclick="fetchRepo()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Charger le Projet
                </button>

                <div class="flex items-center gap-4 py-1">
                    <div class="status-dot status-indicator w-2.5 h-2.5 rounded-full bg-zinc-700 transition-all duration-300 flex-shrink-0"></div>
                    <button class="btn-press flex-1 py-3 bg-transparent border border-cyber-amber/40 rounded-xl
                                   text-cyber-amber font-semibold text-xs uppercase tracking-[0.1em]
                                   hover:bg-cyber-amber/5 hover:border-cyber-amber/70 transition-all duration-200"
                            onclick="openProductionSite()">
                        🌍 Voir le Site Live
                    </button>
                    <div class="status-dot status-indicator w-2.5 h-2.5 rounded-full bg-zinc-700 transition-all duration-300 flex-shrink-0"></div>
                </div>

                <button class="btn-press w-full py-3 bg-transparent border border-zinc-800/40 rounded-xl
                               text-zinc-600 hover:text-red-400 text-xs uppercase tracking-[0.1em] font-medium
                               transition-colors duration-200"
                        onclick="fullReset()">
                    🗑️ Reset & Clear Cache
                </button>
            </div>
        </div>

        <!-- Liste des fichiers -->
        <div id="fileList" class="space-y-5"></div>

        <!-- Signature -->
        <footer class="text-center pt-12 pb-6 text-xs text-zinc-800 tracking-[0.15em] font-medium uppercase">
            Made by Brahim Laiche <span class="text-zinc-700">2026</span> Paris
        </footer>
    </div>

    <script>
        // =============================================
        // LOGIQUE MÉTIER — STRICTEMENT PRÉSERVÉE
        // =============================================
        
        let filesData = {};
        let globalRepoExact = ""; 
        let statusInterval = null;
        let lastRunIdBeforeUpdate = null;

        function saveConfig() {
            localStorage.setItem('sniper_token', document.getElementById('ghToken').value);
            localStorage.setItem('sniper_repo', document.getElementById('repoName').value);
        }

        function loadConfig() {
            const savedToken = localStorage.getItem('sniper_token');
            const savedRepo = localStorage.getItem('sniper_repo');
            if (savedToken) document.getElementById('ghToken').value = savedToken;
            if (savedRepo) document.getElementById('repoName').value = savedRepo;
        }

        function fullReset() {
            if(confirm("Voulez-vous vraiment effacer le token et le cache ?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function notify(m) { 
            const t = document.getElementById('toast'); 
            t.innerText = m; 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function openConfirm(msg, callback) { 
            document.getElementById('confirmMsg').innerText = msg; 
            document.getElementById('confirmBar').style.display = 'flex'; 
            document.getElementById('finalSaveBtn').onclick = () => { callback(); closeConfirm(); }; 
        }

        function closeConfirm() { 
            document.getElementById('confirmBar').style.display = 'none'; 
        }

        function setStatusClass(className) {
            document.querySelectorAll('.status-indicator').forEach(dot => {
                dot.className = "status-dot status-indicator w-2.5 h-2.5 rounded-full transition-all duration-300 flex-shrink-0 " + className;
            });
        }

        function openProductionSite() {
            if (!globalRepoExact) return notify("⚠️ Aucun repo chargé");
            window.open(`https://${globalRepoExact.split('/')[0].toLowerCase()}.github.io/${globalRepoExact.split('/')[1]}/?t=${Date.now()}`, '_blank');
        }

        async function updateActionStatus() {
            if (!globalRepoExact) return;
            const token = document.getElementById('ghToken').value;
            try {
                const res = await fetch(`https://api.github.com/repos/${globalRepoExact}/actions/runs?per_page=1`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                if (data.workflow_runs && data.workflow_runs.length > 0) {
                    const lastRun = data.workflow_runs[0];
                    if (lastRun.id === lastRunIdBeforeUpdate) { setStatusClass("bg-cyber-amber shadow-glow-amber animate-[pulse-amber_0.8s_infinite_alternate]"); return; }
                    if (lastRun.status === "completed") {
                        setStatusClass(lastRun.conclusion === "success" ? "bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.5)]" : "bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.5)]");
                        lastRunIdBeforeUpdate = lastRun.id;
                        clearInterval(statusInterval);
                        if(lastRun.conclusion === "success") notify("✅ DÉPLOIEMENT RÉUSSI");
                    } else { setStatusClass("bg-cyber-amber shadow-glow-amber animate-[pulse-amber_0.8s_infinite_alternate]"); }
                }
            } catch (e) { console.error(e); }
        }

        function startStatusPolling() {
            setStatusClass("bg-cyber-amber shadow-glow-amber animate-[pulse-amber_0.8s_infinite_alternate]");
            clearInterval(statusInterval);
            statusInterval = setInterval(updateActionStatus, 4000);
        }

        async function fetchRepo() {
            const token = document.getElementById('ghToken').value;
            const repoInput = document.getElementById('repoName').value.trim();
            if(!token || !repoInput) return notify("⚠️ Identifiants manquants");
            try {
                const repoMetaRes = await fetch(`https://api.github.com/repos/${repoInput}`, { headers: { 'Authorization': `token ${token}` } });
                const repoMetaData = await repoMetaRes.json();
                globalRepoExact = repoMetaData.full_name;
                
                const runRes = await fetch(`https://api.github.com/repos/${globalRepoExact}/actions/runs?per_page=1`, { headers: { 'Authorization': `token ${token}` } });
                const runData = await runRes.json();
                if(runData.workflow_runs && runData.workflow_runs[0]) {
                    lastRunIdBeforeUpdate = runData.workflow_runs[0].id;
                    const last = runData.workflow_runs[0];
                    setStatusClass(last.status === "completed" ? (last.conclusion === "success" ? "bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.5)]" : "bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.5)]") : "bg-cyber-amber shadow-glow-amber animate-[pulse-amber_0.8s_infinite_alternate]");
                }

                const res = await fetch(`https://api.github.com/repos/${globalRepoExact}/contents/`, { headers: { 'Authorization': `token ${token}` } });
                const files = await res.json();
                document.getElementById('fileList').innerHTML = "";
                for (let f of files) {
                    if (f.type === 'file' && !f.name.match(/\.(png|jpg|ico|gif|webp|woff2)$/i)) {
                        const fileRes = await fetch(f.url, { headers: { 'Authorization': `token ${token}` } });
                        const d = await fileRes.json();
                        const content = decodeURIComponent(escape(atob(d.content)));
                        filesData[f.sha] = { content, path: f.path, name: f.name, matches: [], currentIndex: -1 }; 
                        renderFileCard(f, content);
                    }
                }
                notify("PROJET SYNCHRONISÉ");
            } catch(e) { notify("ERREUR DE CONNEXION"); }
        }

        function renderFileCard(f, content) {
            const div = document.createElement('div');
            div.className = 'bg-deep-600/80 backdrop-blur-sm border border-zinc-800/60 rounded-2xl overflow-hidden shadow-neu-dark';
            
            div.innerHTML = `
                <div class="px-5 py-4 bg-deep-500/60 border-b border-zinc-800/40 flex items-center gap-3">
                    <span class="w-2 h-2 bg-cyber-amber rounded-full shadow-glow-amber flex-shrink-0"></span>
                    <span class="font-mono font-bold text-cyber-amber text-sm tracking-wide">MOD : ${f.name}</span>
                    <span class="ml-auto text-[10px] text-zinc-600 font-mono uppercase tracking-wider">editable</span>
                </div>
                
                <div class="flex items-center gap-2 px-4 py-3 bg-deep-700/50 border-b border-zinc-800/30">
                    <input type="text" id="in-${f.sha}" placeholder="Rechercher dans le fichier..."
                           class="flex-1 h-9 bg-deep-800 border border-zinc-700/40 rounded-lg px-3 text-zinc-200 text-xs font-mono placeholder-zinc-600
                                  focus:outline-none focus:border-cyber-amber/50 transition-all duration-200">
                    <button class="btn-press h-9 px-3 bg-deep-500 border border-zinc-700/40 rounded-lg text-cyber-amber font-bold text-[10px] uppercase tracking-wider hover:bg-deep-500/80 transition-colors"
                            onclick="scan('${f.sha}')">Find</button>
                    <button class="btn-press h-9 px-2.5 bg-deep-500 border border-zinc-700/40 rounded-lg text-zinc-400 hover:text-white font-bold text-sm transition-colors"
                            onclick="prevMatch('${f.sha}')">▲</button>
                    <button class="btn-press h-9 px-2.5 bg-deep-500 border border-zinc-700/40 rounded-lg text-zinc-400 hover:text-white font-bold text-sm transition-colors"
                            onclick="nextMatch('${f.sha}')">▼</button>
                    <div id="count-${f.sha}" class="text-[10px] text-cyber-amber font-mono font-bold min-w-[36px] text-center bg-deep-800 rounded-md px-2 py-1.5">
                        0/0
                    </div>
                </div>
                
                <textarea id="txt-${f.sha}" class="editor-box w-full h-[420px] bg-[#08080a] text-zinc-300 border-none p-5 
                                       font-mono text-[13px] leading-[22px] outline-none resize-y
                                       placeholder-zinc-700 focus:text-zinc-100 transition-colors duration-200"
                          spellcheck="false" 
                          oninput="filesData['${f.sha}'].content = this.value"
                          placeholder="// Éditez votre code ici..."></textarea>
                
                <div id="hist-${f.sha}" class="hidden bg-deep-800 border-t border-zinc-800/40"></div>
                
                <div class="flex gap-3 p-4 bg-deep-500/40 border-t border-zinc-800/40">
                    <button class="btn-press flex-1 py-3 bg-deep-500 border border-zinc-700/40 rounded-xl 
                                   text-zinc-400 hover:text-white font-semibold text-xs uppercase tracking-wider
                                   transition-all duration-200"
                            onclick="toggleHistory('${f.sha}')">
                        Historique
                    </button>
                    <button class="btn-press flex-[2] py-3 bg-cyber-violet rounded-xl text-white font-bold text-xs uppercase tracking-[0.12em]
                                   shadow-glow-violet hover:bg-cyber-violet-hover transition-all duration-200"
                            onclick="prepareSave('${f.sha}')">
                        Update Core
                    </button>
                </div>
            `;
            document.getElementById('fileList').appendChild(div);
            
            document.getElementById(`txt-${f.sha}`).value = content;
        }

        function scan(sha) {
            const q = document.getElementById('in-'+sha).value;
            const txt = filesData[sha].content;
            if(!q) { filesData[sha].matches = []; filesData[sha].currentIndex = -1; updateCounter(sha); return; }
            
            const regex = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            let matches = [], m;
            while ((m = regex.exec(txt)) !== null) { matches.push({s: m.index, e: m.index + m[0].length}); }
            
            filesData[sha].matches = matches;
            filesData[sha].currentIndex = matches.length > 0 ? 0 : -1;
            updateCounter(sha);
            if(matches.length > 0) focusMatch(sha);
        }

        function focusMatch(sha) {
            const data = filesData[sha];
            if(data.matches.length === 0 || data.currentIndex < 0) return;
            const match = data.matches[data.currentIndex];
            const ta = document.getElementById('txt-'+sha);
            ta.focus();
            ta.setSelectionRange(match.s, match.e);
            updateCounter(sha);
        }

        function nextMatch(sha) {
            const data = filesData[sha];
            if(data.matches.length === 0) return;
            data.currentIndex = (data.currentIndex + 1) % data.matches.length;
            focusMatch(sha);
        }

        function prevMatch(sha) {
            const data = filesData[sha];
            if(data.matches.length === 0) return;
            data.currentIndex = (data.currentIndex - 1 + data.matches.length) % data.matches.length;
            focusMatch(sha);
        }

        function updateCounter(sha) { 
            document.getElementById('count-'+sha).innerText = filesData[sha].matches.length > 0 ? `${filesData[sha].currentIndex + 1}/${filesData[sha].matches.length}` : "0/0"; 
        }

        async function toggleHistory(sha) {
            const historyDiv = document.getElementById(`hist-${sha}`);
            if(historyDiv.style.display === 'block') { historyDiv.style.display = 'none'; return; }
            const token = document.getElementById('ghToken').value;
            const file = filesData[sha];
            notify("LECTURE LOGS...");
            try {
                const res = await fetch(`https://api.github.com/repos/${globalRepoExact}/commits?path=${file.path}&per_page=5`, { headers: { 'Authorization': `token ${token}` } });
                const commits = await res.json();
                historyDiv.innerHTML = commits.map(c => `
                    <div class="px-5 py-3 border-b border-zinc-800/40 cursor-pointer hover:bg-deep-600/60 transition-colors duration-150"
                         onclick="loadOldVersion('${sha}', '${c.sha}')">
                        <div class="text-cyber-amber font-mono font-bold text-xs mb-1">${new Date(c.commit.author.date).toLocaleString()}</div>
                        <div class="text-zinc-500 text-[11px] truncate">${c.commit.message}</div>
                    </div>
                `).join('') || '<div class="px-5 py-4 text-zinc-600 text-xs">Aucun log disponible</div>';
                historyDiv.style.display = 'block';
            } catch(e) { notify("ERREUR LOGS"); }
        }

        async function loadOldVersion(sha, commitSha) {
            const token = document.getElementById('ghToken').value;
            const file = filesData[sha];
            try {
                const res = await fetch(`https://api.github.com/repos/${globalRepoExact}/contents/${file.path}?ref=${commitSha}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                const oldContent = decodeURIComponent(escape(atob(data.content)));
                document.getElementById(`txt-${sha}`).value = oldContent;
                filesData[sha].content = oldContent;
                notify("VERSION RESTAURÉE");
                document.getElementById(`hist-${sha}`).style.display = 'none';
            } catch(e) { notify("ERREUR RESTAURATION"); }
        }

        function prepareSave(sha) { openConfirm(`DÉPLOYER LES MODIFICATIONS ?`, () => executeUpdate(sha)); }
        
        async function executeUpdate(sha) {
            const token = document.getElementById('ghToken').value;
            const file = filesData[sha];
            try {
                const check = await fetch(`https://api.github.com/repos/${globalRepoExact}/contents/${file.path}`, { headers: { 'Authorization': `token ${token}` } });
                const latest = await check.json();
                const res = await fetch(`https://api.github.com/repos/${globalRepoExact}/contents/${file.path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Sniper Core Update", content: btoa(unescape(encodeURIComponent(file.content))), sha: latest.sha })
                });
                if(res.ok) { notify("PUSH RÉUSSI"); startStatusPolling(); }
            } catch (e) { notify("ERREUR PUSH"); }
        }
    </script>
